spring:
  application:
    name: novacart

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${APP_DB_HOST:localhost}:${APP_DB_PORT:5432}/${APP_DB_NAME:novacart}
    username: ${APP_DB_USERNAME}
    password: ${APP_DB_PASSWORD}
#    url: jdbc:postgresql://localhost:5432/novacart
#    username: postgres
#    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}
